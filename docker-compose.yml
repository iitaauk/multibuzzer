services:
  multibuzzer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run
    cap_drop:
      - ALL
    user: "node"
    environment:
      - PORT=4001
      - NODE_ENV=production
